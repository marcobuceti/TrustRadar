<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trust Radar Pro - Live Banking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --border: #30363d; --neon: #00d2ff; --accent: #ff4bb4; --green: #00b67a; --red: #ff3722; --orange: #ff8622; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 50px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: -1px; }
        .update-tag { color: #8b949e; font-size: 14px; margin-top: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 25px; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 25px; position: relative; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.4); height: 360px; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 0 20px rgba(0, 210, 255, 0.15); }
        
        .score-circle { position: absolute; top: 25px; right: 25px; width: 60px; height: 60px; border: 4px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; background: var(--bg); }
        
        .logo-box { width: 50px; height: 50px; background: white; border-radius: 12px; padding: 5px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .bank-name { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
        .bank-url { font-size: 12px; color: #8b949e; margin-bottom: 15px; }
        
        .stars { font-size: 18px; margin-right: 5px; }
        .badge { font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 5px; border: 1px solid; text-transform: uppercase; }

        .store-ratings { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .store-item { display: flex; align-items: center; gap: 8px; }
        .store-icon { width: 18px; height: 18px; }
        .store-val { font-size: 14px; font-weight: 700; color: #fff; }
        .store-label { font-size: 10px; color: #8b949e; text-transform: uppercase; display: block; }

        .rev-info { margin-top: auto; padding-top: 15px; font-size: 13px; color: #8b949e; display: flex; justify-content: space-between; align-items: center; }
        .trust-link { color: var(--neon); text-decoration: none; font-weight: 600; font-size: 12px; }
        .trend-up { color: #00ff88; font-weight: bold; margin-left: 5px; }
        .trend-down { color: var(--red); font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>TRUST RADAR PRO</h1>
        <div class="update-tag" id="last-update">Sincronizzazione manuale</div>
    </header>

    <div class="grid" id="dashboard-grid"></div>
</div>

<script>
    // --- DATI AGGIORNATI DA TRUSTPILOT ---
    const data = [
        { name: "BBVA Italia", url: "bbva.it", score: 4.3, revs: "8.3K", trend: "up", appS: 4.8, playS: 4.7 },
        { name: "Revolut", url: "revolut.com", score: 4.7, revs: "382K", trend: "stable", appS: 4.9, playS: 4.8 },
        { name: "Fineco", url: "finecobank.com", score: 4.2, revs: "58K", trend: "up", appS: 4.7, playS: 4.5 },
        { name: "Isybank", url: "isybank.com", score: 2.0, revs: "753", trend: "up", appS: 4.6, playS: 4.4 },
        { name: "Findomestic", url: "findomestic.it", score: 4.4, revs: "23K", trend: "down", appS: 4.7, playS: 4.5 },
        { name: "Mediolanum", url: "bancamediolanum.it", score: 3.8, revs: "7.3K", trend: "stable", appS: 4.6, playS: 4.4 },
        { name: "BPER Banca", url: "bper.it", score: 4.2, revs: "7.8K", trend: "down", appS: 4.4, playS: 3.8 },
        { name: "Credem", url: "credem.it", score: 1.9, revs: "960", trend: "stable", appS: 4.5, playS: 4.1 },
        { name: "Credit Agricole", url: "credit-agricole.it", score: 1.8, revs: "117", trend: "down", appS: 4.4, playS: 4.0 },
        { name: "ING Italia", url: "ing.it", score: 3.5, revs: "9K", trend: "down", appS: 4.0, playS: 3.2 },
        { name: "UniCredit", url: "unicredit.it", score: 2.1, revs: "3K", trend: "down", appS: 4.6, playS: 4.3 },
        { name: "Intesa Sanpaolo", url: "intesasanpaolo.com", score: 1.4, revs: "4.1K", trend: "down", appS: 4.7, playS: 4.5 },
        { name: "BNL Bnp Paribas", url: "bnl.it", score: 2.5, revs: "3.8K", trend: "down", appS: 4.5, playS: 4.0 },
        { name: "Poste Italiane", url: "poste.it", score: 1.2, revs: "15K", trend: "down", appS: 4.7, playS: 4.3 },
        { name: "Banco Posta", url: "poste.it", score: 1.2, revs: "266", trend: "down", appS: 4.6, playS: 4.2 }
    ];

    function renderDashboard() {
        const grid = document.getElementById('dashboard-grid');
        // Ordina automaticamente per TrustScore decrescente
        data.sort((a, b) => b.score - a.score);

        data.forEach(bank => {
            const color = bank.score >= 4 ? '#00b67a' : (bank.score >= 2.5 ? '#ff8622' : '#ff3722');
            const trendIcon = bank.trend === 'up' ? '↑' : (bank.trend === 'down' ? '↓' : '→');
            const trendClass = bank.trend === 'up' ? 'trend-up' : (bank.trend === 'down' ? 'trend-down' : '');
            
            let stars = "";
            for(let i=0; i<5; i++) {
                stars += `<span style="color: ${i < Math.round(bank.score) ? color : '#30363d'}">★</span>`;
            }

            const card = `
                <div class="card">
                    <div class="score-circle">${bank.score}</div>
                    <div class="logo-box">
                        <img src="https://www.google.com/s2/favicons?domain=${bank.url}&sz=128" alt="logo">
                    </div>
                    <div class="bank-name">${bank.name}</div>
                    <div class="bank-url">${bank.url}</div>
                    <div>
                        <span class="stars">${stars}</span>
                        <span class="badge" style="color:${color}; border-color:${color}">${bank.score >= 4 ? 'ECCELLENTE' : (bank.score >= 2.5 ? 'BUONO' : 'SCARSO')}</span>
                    </div>

                    <div class="store-ratings">
                        <div class="store-item">
                            <svg class="store-icon" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.1 2.48-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.31-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                            <div>
                                <span class="store-label">App Store</span>
                                <span class="store-val">${bank.appS}</span>
                            </div>
                        </div>
                        <div class="store-item">
                            <svg class="store-icon" viewBox="0 0 24 24" fill="#3ddc84"><path d="M17.523 15.3414L20.355 18.1734C20.5112 18.3297 20.5112 18.583 20.355 18.7392L18.7392 20.355C18.583 20.5112 18.3297 20.5112 18.1734 20.355L15.3414 17.523C13.9308 18.4526 12.2476 19 10.4286 19C5.77351 19 2 15.2265 2 10.5714C2 5.91638 5.77351 2.14286 10.4286 2.14286C15.0837 2.14286 18.8571 5.91638 18.8571 10.5714C18.8571 12.3904 18.3097 14.0736 17.3801 15.4842L17.523 15.3414Z" fill-opacity="0.3"/><path d="M15.5 13.5L18.5 16.5M17.5 10.5C17.5 14.366 14.366 17.5 10.5 17.5C6.63401 17.5 3.5 14.366 3.5 10.5C3.5 6.63401 6.63401 3.5 10.5 3.5C14.366 3.5 17.5 6.63401 17.5 10.5Z" stroke="#3ddc84" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                            <div>
                                <span class="store-label">Play Store</span>
                                <span class="store-val">${bank.playS}</span>
                            </div>
                        </div>
                    </div>

                    <div class="rev-info">
                        <span>Recensioni TP: <b>${bank.revs}</b> <span class="${trendClass}">${trendIcon}</span></span>
                        <a href="https://it.trustpilot.com/review/${bank.url}" target="_blank" class="trust-link">Trustpilot ↗</a>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });
    }

    document.getElementById('last-update').innerText = "Ultimo aggiornamento: 02 Aprile 2024";
    renderDashboard();
</script>

</body>
</html>
