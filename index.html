<!DOCTYPE html>
<html lang="it">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0e14; --card-bg: #161b22; --border: #30363d; --neon: #00d2ff; --accent: #ff4bb4; --green: #00b67a; --red: #ff3722; --orange: #ff8622; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 52px; font-weight: 800; background: linear-gradient(90deg, var(--accent), var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: -2px; }
        .update-tag { color: #8b949e; font-size: 14px; margin-top: 10px; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 30px; }
        
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 30px; padding: 30px; position: relative; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 15px 35px rgba(0,0,0,0.5); height: 420px; display: flex; flex-direction: column; }
        .card:hover { border-color: var(--neon); transform: translateY(-10px); box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }
        
        /* TrustScore Circle */
        .score-circle { position: absolute; top: 30px; right: 30px; width: 68px; height: 68px; border: 4px solid var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; background: var(--bg); box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        
        .logo-box { width: 55px; height: 55px; background: white; border-radius: 14px; padding: 6px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .bank-name { font-size: 26px; font-weight: 800; margin-bottom: 4px; color: #fff; }
        .bank-url { font-size: 13px; color: #8b949e; margin-bottom: 20px; font-weight: 500; }
        
        .stars { font-size: 22px; margin-right: 8px; }
        .badge { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 8px; border: 1px solid; text-transform: uppercase; letter-spacing: 1px; }

        /* Store Ratings Section - POTENZIATA */
        .store-ratings { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; padding: 25px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.02); margin-left: -30px; margin-right: -30px; padding-left: 30px; padding-right: 30px; }
        .store-item { display: flex; align-items: center; gap: 15px; }
        .store-icon { width: 32px; height: 32px; }
        .store-info { display: flex; flex-direction: column; }
        .store-val { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; letter-spacing: -1px; }
        .store-label { font-size: 11px; color: #8b949e; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 2px; }

        .rev-info { margin-top: auto; padding-top: 15px; font-size: 14px; color: #8b949e; display: flex; justify-content: space-between; align-items: center; }
        .trust-link { color: var(--neon); text-decoration: none; font-weight: 700; font-size: 13px; border: 1px solid var(--neon); padding: 6px 15px; border-radius: 12px; transition: 0.3s; }
        .trust-link:hover { background: var(--neon); color: var(--bg); }
        
        .trend-up { color: #00ff88; font-weight: 800; }
        .trend-down { color: var(--red); font-weight: 800; }
    </style>
</head>
<body>

</div>
